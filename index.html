<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- vazirmatn , anton -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <!-- remixicon -->
    <link rel="stylesheet" href="node_modules/remixicon/fonts/remixicon.css">
    <!-- tailwind -->
    <link rel="stylesheet" href="dist/output.css">
    <!-- css files -->
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/animation.css">
    <title>بهارک آلومنیوم</title>
</head>
<body>
    

    <main class="app-main overflow-hidden">

        <!-- ===== Header =====  -->
         <header id="header" class="h-15 hidden fixed top-0 left-0 right-0 ">
            <div class="w-full h-full flex items-center justify-between">
                
                <button onclick="toggleMenu()" class="w-12 h-12 rounded-full bg-surface border border-border text-text">
                    <i class="ri-menu-3-line text-2xl"></i>
                </button>

                <div class="w-3/4 h-12 rounded-full border bg-surface border-border flex items-center justify-between pl-1">
                    <div class="h-full flex items-center justify-start px-1 gap-2">
                        <span class="inline-flex w-10 h-10 rounded-full bg-primary items-center justify-center text-surface">
                            B
                        </span>

                        <h3 class="font-vazirmatn text-[14px] flex flex-col font-bold">
                            بهارک آلومنیوم
                            <span class="text-[10px] font-medium">
                                زیبایی و کیفیت در کنار هم
                            </span>
                        </h3>
                    </div>

                    <a href="tel:09043695709" class="inline-flex items-center justify-center w-10 h-10 rounded-full text-text">
                        <i class="ri-phone-fill text-2xl"></i>
                    </a>
                </div>
            </div>
         </header>

        <!-- ===== Splash screen =====  -->

        <section id="splash-screen" class="screen w-full h-screen  ">
            <div class="w-full h-full flex items-center justify-center flex-col bg-transparent relative">

                <h3 class="flex flex-col text-4xl font-anton gap-3 text-alu-deep">
                    Baharak Aluminum
                    <span class="font-vazirmatn text-2xl font-extrabold">
                        بهارک آلومنیوم
                    </span>
                </h3>
            
                
                <div class="stage w-5/6 h-50 bg-linear-to-b to-80% from-primary/30 to-white absolute rounded-t-full flex items-start justify-center">
                    <img src="src/assets/images/spash-intro.png" class="absolute top-20" alt="">
                </div>
                
                <button class="splash-btn w-11 h-11 bg-linear-to-b from-primary/60 to-primary  rounded-full absolute right-6 bottom-7 flex items-center justify-center">
                    <i class="ri-arrow-left-s-line text-xl text-silver-50"></i>
                </button>

            </div>
        </section>

        <!-- ===== Screen category =====  -->
        <section id="category-screen" class="screen w-full h-screen pt-17 hidden">
            <!-- محتوای این بخش توسط JavaScript پر می‌شود -->
        </section>


        <div id="modal-overlay" class="fixed inset-0 bg-black/10 backdrop-blur-[2px] z-30 hidden pointer-events-none"></div>

        <section id="modal-menu" class="modal w-full fixed bottom-0 left-0 right-0 h-5/6 bg-white z-32 hidden rounded-t-4xl p-3">
            <div class="modal-head w-full h-10  flex items-start justify-center">
                <span class="inline-flex w-15 h-1 rounded-full bg-gray-300"></span>
            </div>
            
            <ul class="w-4/5 h-auto flex flex-col gap-4 mx-auto">
            </ul>
        </section>


    </main>

<!-- script -->
<script src="src/js/script.js"></script>
<script src="src/js/main.js"></script>
</body>
</html>
